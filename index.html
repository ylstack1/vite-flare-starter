<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Favicon + Web App Manifest (Share Target on mobile) -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="manifest" href="/manifest.json" />

    <!-- Primary Meta Tags -->
    <title>Vite Flare Starter — Multi-user multi-agent AI workspace</title>
    <meta name="title" content="Vite Flare Starter — Multi-user multi-agent AI workspace" />
    <meta name="description" content="Open-source AI workspace for Cloudflare Workers. Spaces, Projects, AI chat with 95+ tools, autonomous agents, MCP, voice, video. Every module is a worked example you can fork and ship." />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Vite Flare Starter — Multi-user multi-agent AI workspace" />
    <meta property="og:description" content="Open-source AI workspace for Cloudflare Workers. Spaces, Projects, AI chat with 95+ tools, autonomous agents, MCP, voice, video. Fork it and ship." />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary" />
    <meta property="twitter:title" content="Vite Flare Starter — Multi-user multi-agent AI workspace" />
    <meta property="twitter:description" content="Open-source AI workspace for Cloudflare Workers. Spaces, Projects, AI chat with 95+ tools, autonomous agents, MCP, voice, video. Fork it and ship." />

    <!-- Theme Color -->
    <meta name="theme-color" content="#0a0a0a" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />

    <!--
      Synchronous theme initialization to prevent flash of incorrect theme.
      Mirrors getThemeStorageKey() in src/shared/config/app.ts. The localStorage
      key is `${VITE_APP_ID}-theme`; this script defaults to the same fallback
      app id used by appConfig. If you set VITE_APP_ID, also update APP_ID below.
      Keep in sync with src/client/components/theme-provider.tsx and src/lib/themes.ts.
    -->
    <script>
      (function () {
        try {
          const APP_ID = 'vite-flare-starter';
          const stored = localStorage.getItem(APP_ID + '-theme');
          let mode = stored || 'system';
          if (mode === 'system') {
            mode = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
          }
          const root = document.documentElement;
          if (mode === 'dark') root.classList.add('dark');
          else root.classList.remove('dark');
        } catch (_) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/client/main.tsx"></script>
  </body>
</html>
